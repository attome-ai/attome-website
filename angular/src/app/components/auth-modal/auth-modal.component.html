@if (isOpen()) {
  <div class="modal-backdrop" (click)="closeOnBackdrop($event)">
    <div class="modal-card" role="dialog" aria-modal="true" aria-label="Sign in to Attome">

      <button class="modal-close" (click)="close()" aria-label="Close">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M2 2L14 14M14 2L2 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>

      <div class="modal-header">
        <div class="modal-logo">
          <svg width="32" height="32" viewBox="0 0 28 28" fill="none">
            <rect width="28" height="28" rx="7" fill="rgba(255,255,255,0.1)"/>
            <path d="M7 20L14 8L21 20" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M9.5 16H18.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span class="modal-brand">Attome</span>
        </div>
        <h2 class="modal-title">Welcome back</h2>
        <p class="modal-sub">Sign in to the GCC Enterprise Platform</p>
      </div>

      @if (error()) {
        <div class="error-banner" role="alert">{{ error() }}</div>
      }

      @if (loading()) {
        <div class="loading-row">
          <div class="spinner"></div>
          <span>Signing in…</span>
        </div>
      } @else {
        <div [id]="googleBtnId" class="google-btn-slot"></div>
      }

    </div>
  </div>
}

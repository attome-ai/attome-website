# All dev infrastructure runs externally — no containers needed here.
#
# External services (already running on your machine):
#   PostgreSQL 18   →  localhost:5555   (database: attomedb, schema: attome_dev)
#   DragonflyDB     →  localhost:6379   (Redis-compatible)
#   RustFS          →  localhost:9000   (S3-compatible, MinIO protocol)
#
# Just copy .env.example → .env, fill in your credentials, then:
#   cargo run --manifest-path crates/server/Cargo.toml
